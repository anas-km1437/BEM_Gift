<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة النهاية</title>
    <style>
        /* إعدادات عامة وخلفية الشاشة */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10; /* خلفية داكنة */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* حاوية الاحتفالية والنص */
        .celebration-container {
            text-align: center;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 3rem;
            color: #f5cf4a;
            text-shadow: 0 0 10px rgba(245, 207, 74, 0.5);
            margin-bottom: 20px;
        }

        /* حاوية الأزرار - الوضع الافتراضي (شاشات الكمبيوتر) */
        .final-buttons {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* تصميم الأزرار */
        .finalBtn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(45deg, #1f2833, #45a29e);
            border: 2px solid #66fcf1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .finalBtn:hover {
            background: linear-gradient(45deg, #45a29e, #1f2833);
            box-shadow: 0 0 15px #66fcf1;
            transform: scale(1.05);
        }

        /* التعديل الخاص بالنقال (رفع الأزرار والترتيب العمودي) */
        @media(max-width: 480px){
            .final-buttons {
                bottom: 120px; /* تم رفعها للأعلى لتجنب تداخل أزرار الهاتف */
                gap: 15px;
                flex-direction: column; /* ترتيب الأزرار فوق بعضها لسهولة الضغط */
                align-items: center;
            }

            .finalBtn {
                padding: 15px;
                font-size: 16px;
                width: 85%; /* تكبير عرض الزر ليكون واضحاً */
                max-width: 250px;
                box-shadow: 0 10px 20px rgba(0,0,0,0.3); /* إضافة ظل لزيادة الوضوح */
            }
        }
    </style>
</head>
<body>

    <div class="celebration-container">
        <h1>النهاية</h1>
        <p>لقد أتممت التجربة بنجاح.</p>

        <div class="final-buttons">
            <button class="finalBtn" onclick="restart()">إعادة التجربة</button>
            <button class="finalBtn" onclick="developers()">المطور</button>
            <button class="finalBtn" onclick="exitApp()">الخروج</button>
        </div>
    </div>

    <script>
        // دوال الأزرار (يتم ربطها بالمنطق الخاص بتطبيقك)
        function restart() {
            console.log("جاري إعادة التجربة...");
            // أضف مسار أو كود إعادة التشغيل هنا
        }

        function developers() {
            console.log("تم التطوير بواسطة: أنس");
            // أضف كود عرض المطورين هنا
        }

        function exitApp() {
            console.log("جاري الخروج...");
            // أضف كود الخروج هنا
        }
    </script>
</body>
</html>
